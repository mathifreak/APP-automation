# ============================================================
# App Automation Framework — Global Configuration
# ============================================================

# --- Application ---
app.name=Mobile App
app.bundle.id=one.pice.pice_business_loan.pre

# --- Environment ---
env=staging

# --- Platform (android / ios) ---
platform=android

# --- Appium Server ---
appium.server.url=http://127.0.0.1:4723

# --- Wait Timeouts (seconds) ---
explicit.wait.seconds=8
implicit.wait.seconds=5

# --- App Paths (place your APK/IPA in src/test/resources/apps/) ---
android.app.path=src/test/resources/apps/pice-business-loan-4.13.1-pre.apk
ios.app.path=src/test/resources/apps/app-staging.ipa

# --- Login Credentials (for AuthHelper) ---
login.mobile.number=
login.otp=
test.mobile.number=
test.otp=

# --- Test Card Details (for Add Card flow tests) ---
test.card.number=4111460903362832
test.card.expiry=11/28
test.card.cvv=245
test.card.holder.name=TEST USER

# --- Test Pay Bill Data (for Pay Bill flow tests) ---
# Positive test: last 4 digits of card to add for Pay Bills, bank = IndusInd Bank (via Other Banks)
test.paybill.last4=7649
# Negative test: random/invalid card digits for negative tests
test.paybill.invalid.last4=9999
test.paybill.invalid.bank=Axis Bank

# --- Retry ---
retry.count=1

# --- Cloud Execution (BrowserStack / Sauce Labs) ---
cloud.execution=false
cloud.url=
cloud.username=
cloud.access.key=

# --- Screenshot ---
screenshot.on.failure=true
screenshot.on.pass=false

# --- Logging ---
log.level=INFO

# --- Installation ---
app.install=false


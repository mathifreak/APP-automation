# ============================================================
#  Test Execution Configuration — Skip & Priority
# ============================================================
#
#  Controls which tests run and in what order, WITHOUT editing
#  Java source files.
#
#  Format:
#    <SimpleClassName>.<methodName>.skip     = true | false
#    <SimpleClassName>.<methodName>.priority  = <integer>
#
#  Rules:
#    • If a key is absent, the code-level @Test annotation value is used.
#    • skip=true  → sets @Test(enabled=false) at runtime.
#    • priority   → overrides @Test(priority=N) at runtime.
#    • Reload: values are read once when the JVM starts the suite.
#
#  Quick recipe — skip an entire module:
#    Set skip=true for every method in that class.
#
#  Quick recipe — re-order within a module:
#    Change the priority values (lower = runs first).
# ============================================================



# ============================================================
# Login Module — Test Data Properties
# Centralized test data for PhoneValidation, OTP, and Security tests.
# ============================================================

# -------- Valid Phone Numbers --------

# Valid registered number (triggers real OTP flow)
login.valid.phone=9962063736

# Unregistered number (should NOT reach OTP screen — expected: stay on login with error)
login.unregistered.phone=9000000001

# -------- Boundary Phone Numbers --------

# Exactly 9 digits (below minimum — Proceed should be DISABLED)
login.phone.9digits=987654321

# Exactly 11 digits (above maximum — Proceed should be DISABLED)
login.phone.11digits=98765432109

# All same digits (valid 10-digit — Proceed should be ENABLED)
login.phone.all.same=9999999999

# Sequential digits (valid 10-digit — Proceed should be ENABLED)
login.phone.sequential=1234567890

# Starting with 0 (behaviour depends on app validation — assert Proceed state)
login.phone.starts.zero=0987654321

# All zeros (invalid — Proceed should be DISABLED or app rejects)
login.phone.all.zeros=0000000000

# -------- Invalid Format Phone Numbers --------

# Alphabetic characters only (Proceed should be DISABLED)
login.phone.alpha=abcdefghij

# Special characters (Proceed should be DISABLED)
login.phone.special=@#$%^&*()!

# Mixed alphanumeric (Proceed should be DISABLED)
login.phone.mixed=abc1234567

# With +91 country code prefix (13 chars — verify field truncation or Proceed state)
login.phone.with.plus91=+919962063736

# With 91 prefix only (12 digits — verify field behaviour)
login.phone.with.91=919962063736

# Emoji characters (field should reject or Proceed should be DISABLED)
login.phone.emoji=9876543210

# Spaces only (Proceed should be DISABLED)
login.phone.spaces=          

# Leading space before 10-digit number (Proceed should be DISABLED)
login.phone.leading.space= 9876543210

# Trailing space after 10-digit number (verify trimming behavior)
login.phone.trailing.space=9876543210 

# -------- OTP Values --------

# Static OTP that works in staging (configured in config.properties as test.otp)
login.otp.valid=999999

# Clearly wrong OTP (6 zeros — will trigger error message)
login.otp.wrong=000000

# Partial OTP — only 3 digits (Proceed should be DISABLED on OTP screen)
login.otp.partial=123

# Alphabetic OTP (should be rejected by OTP field)
login.otp.alpha=ABCDEF

# Special chars OTP (should be rejected by OTP field)
login.otp.special=!@#$%^

# One digit short of 6 (5 digits — Proceed should be DISABLED)
login.otp.short5=12345

# -------- Security Test Config --------

# Number of wrong OTP attempts before testing for error/lock message
login.security.brute.force.attempts=3
